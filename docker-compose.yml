services:
  telemetry:
    build: .
    container_name: connected-vehicle
    ports:
      - "8080:8080"
    volumes:
      # datapoints are written here on the host:
      - ./telemetry:/data
      # live-edit the dashboard without rebuilding the image:
      - ./telemetry_dashboard.html:/app/telemetry_dashboard.html:ro
      # drop the broker's CA + client cert/key here for mutual-TLS (see KAFKA_SSL_* below):
      - ./certs:/certs:ro
    environment:
      - TELEMETRY_DIR=/data
      - KAFKA_BROKER=orvill.ddns.net:9093
      - KAFKA_TOPIC=ConnectedCar1
      - KAFKA_ENABLED=1
      # broker on 9093 requires mutual TLS; provide cert material under ./certs:
      - KAFKA_SECURITY_PROTOCOL=SSL
      - KAFKA_SSL_CAFILE=/certs/ca.pem
      - KAFKA_SSL_CERTFILE=/certs/client.pem
      - KAFKA_SSL_KEYFILE=/certs/client.key
      # - KAFKA_SSL_PASSWORD=<key passphrase if the client key is encrypted>
      # - KAFKA_SSL_CHECK_HOSTNAME=1
    restart: unless-stopped
