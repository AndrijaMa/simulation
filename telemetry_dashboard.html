<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connected Vehicle Telemetry Monitor</title>
<style>
  :root{
    --bg:#000; --panel:#1c1c1e; --panel-2:#161618; --line:rgba(255,255,255,.08);
    --line-strong:rgba(255,255,255,.16);
    --txt:#f5f5f7; --muted:#8e8e93; --accent:#4a8cff; --accent-2:#5ac8fa;
    --red:#e2231a; --warn:#ff9f0a; --bad:#ff453a; --good:#30d158; --chip:rgba(255,255,255,.06);
    --shadow:0 20px 60px -16px rgba(0,0,0,.85);
    --ease:cubic-bezier(.32,.72,0,1); --fast:.16s; --med:.3s;
  }
  *{box-sizing:border-box}
  ::selection{background:rgba(74,140,255,.3)}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       color:var(--txt);min-height:100vh;-webkit-font-smoothing:antialiased;font-weight:400;
       background:radial-gradient(120% 80% at 50% -10%,#141416 0%,#000 60%)}

  header{padding:14px 28px;display:flex;align-items:center;gap:18px 26px;
         border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;
         background:rgba(0,0,0,.7);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px)}
  .brand{display:flex;align-items:center;gap:14px}
  .brand .logo{font-size:13px;font-weight:800;letter-spacing:5px;color:var(--txt);text-transform:uppercase;
       padding-right:14px;border-right:1px solid var(--line)}
  .brand h1{margin:0;font-size:15px;font-weight:500;letter-spacing:.2px;color:var(--txt)}
  .brand .sub{font-size:12px;color:var(--muted);font-weight:400}
  .ident{display:flex;gap:18px;flex-wrap:wrap;margin-left:auto;align-items:center}
  .ident .item{display:flex;flex-direction:column;gap:1px}
  .ident .k{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted)}
  .ident .v{font-size:13px;font-weight:500;font-variant-numeric:tabular-nums;color:var(--txt)}
  .live{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:1.5px;color:var(--good)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 8px var(--good);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* Tesla-style floating bottom app dock */
  nav{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);max-width:calc(100vw - 24px);
      display:flex;gap:4px;padding:7px;z-index:40;overflow-x:auto;scrollbar-width:none;
      background:rgba(28,28,30,.82);border:1px solid var(--line);border-radius:22px;
      box-shadow:var(--shadow);-webkit-backdrop-filter:blur(28px) saturate(150%);backdrop-filter:blur(28px) saturate(150%)}
  nav::-webkit-scrollbar{display:none}
  .tab{padding:9px 14px;border-radius:16px;background:transparent;border:none;color:var(--muted);
       cursor:pointer;font-size:12.5px;font-weight:500;display:flex;align-items:center;gap:7px;white-space:nowrap;
       transition:background var(--fast) var(--ease),color var(--fast),transform var(--fast)}
  .tab:hover{color:var(--txt);background:var(--chip)}
  .tab:active{transform:scale(.94)}
  .tab.active{background:var(--txt);color:#000;font-weight:600}
  .tab .count{font-size:11px;background:rgba(0,0,0,.12);padding:1px 7px;border-radius:999px;font-variant-numeric:tabular-nums}
  .tab:not(.active) .count{background:var(--chip);color:var(--muted)}

  main{padding:26px 28px 120px;max-width:1600px;margin:0 auto}
  .panel-title{display:flex;align-items:baseline;gap:12px;margin:4px 0 20px;animation:slideIn .4s var(--ease)}
  .panel-title h2{margin:0;font-size:24px;font-weight:600;letter-spacing:-.4px;text-transform:capitalize}
  .panel-title .hint{font-size:12px;color:var(--muted)}
  @keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:17px 18px;cursor:pointer;
        position:relative;overflow:hidden;
        transition:transform var(--med) var(--ease),background var(--fast),border-color var(--fast);
        animation:cardIn .45s var(--ease) both}
  @keyframes cardIn{from{opacity:0;transform:translateY(12px) scale(.98)}to{opacity:1;transform:none}}
  .card:hover{transform:translateY(-3px);background:#242426;border-color:var(--line-strong)}
  .card:active{transform:scale(.98)}
  .card .label{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:11px;font-weight:600;
               white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card .val{font-size:30px;font-weight:300;line-height:1;display:flex;align-items:baseline;gap:6px;
             font-variant-numeric:tabular-nums;letter-spacing:-1px;color:var(--txt)}
  .card .unit{font-size:14px;color:var(--muted);font-weight:400}
  .card .meta{margin-top:11px;font-size:11px;color:var(--muted)}
  .card .magnify{position:absolute;top:15px;right:16px;opacity:0;font-size:13px;color:var(--accent);transition:opacity var(--fast)}
  .card:hover .magnify{opacity:.7}

  .badge{display:inline-block;padding:6px 13px;border-radius:10px;font-size:14px;font-weight:600;letter-spacing:.3px;border:1px solid transparent}
  .b-good{background:rgba(48,209,88,.14);color:var(--good);border-color:rgba(48,209,88,.24)}
  .b-bad{background:rgba(255,69,58,.16);color:var(--bad);border-color:rgba(255,69,58,.3);animation:throb 1.5s ease-in-out infinite}
  @keyframes throb{50%{box-shadow:0 0 18px -2px rgba(255,69,58,.55)}}
  .b-warn{background:rgba(255,159,10,.15);color:var(--warn);border-color:rgba(255,159,10,.28)}
  .b-neutral{background:var(--chip);color:var(--txt);border-color:var(--line)}

  .spark{display:flex;gap:3px;align-items:flex-end;height:38px;margin-top:8px}
  .spark span{flex:1;background:linear-gradient(180deg,var(--accent),var(--accent-2));border-radius:3px;min-height:3px;opacity:.9;
       animation:grow .5s var(--ease) both}
  @keyframes grow{from{transform:scaleY(0);transform-origin:bottom}to{transform:scaleY(1)}}

  .wheels{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
  .wheels .w{background:var(--chip);border:1px solid var(--line);border-radius:11px;padding:7px 10px;font-size:12px;display:flex;justify-content:space-between}
  .wheels .w b{color:var(--accent);font-variant-numeric:tabular-nums;font-weight:600}

  /* location map */
  .map-wrap{position:relative;border:1px solid var(--line);border-radius:22px;overflow:hidden;
            margin-bottom:16px;background:#0a0a0c;height:380px;animation:cardIn .45s var(--ease) both}
  .map-wrap svg{display:block;width:100%;height:100%}
  .map-grid line{stroke:rgba(255,255,255,.045);stroke-width:1}
  .map-road{fill:none;stroke-linecap:round}
  .map-road.major{stroke:#36363c;stroke-width:8}
  .map-road.minor{stroke:#26262a;stroke-width:4}
  .map-route{fill:none;stroke:var(--accent);stroke-width:5;stroke-linecap:round;
             filter:drop-shadow(0 0 7px rgba(74,140,255,.7))}
  .acc-ring{fill:rgba(74,140,255,.1);stroke:rgba(74,140,255,.4);stroke-width:1.5;animation:accpulse 2.6s ease-out infinite}
  @keyframes accpulse{0%{r:16;opacity:.9}100%{r:64;opacity:0}}
  .map-badge{position:absolute;right:16px;top:16px;display:flex;align-items:center;gap:8px;
             background:rgba(0,0,0,.55);border:1px solid var(--line);border-radius:999px;padding:7px 14px;
             font-size:11px;font-weight:600;letter-spacing:.6px;color:var(--txt);
             -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
  .map-overlay{position:absolute;left:16px;bottom:16px;display:flex;gap:9px;flex-wrap:wrap}
  .map-chip{background:rgba(0,0,0,.55);border:1px solid var(--line);border-radius:14px;padding:9px 13px;
            -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
  .map-chip .k{font-size:9px;text-transform:uppercase;letter-spacing:1.1px;color:var(--muted);display:block;margin-bottom:2px}
  .map-chip .v{font-size:14px;font-variant-numeric:tabular-nums;font-weight:500;color:var(--txt)}
  .map-zoom{position:absolute;right:16px;bottom:16px;display:flex;flex-direction:column;
            border:1px solid var(--line);border-radius:14px;overflow:hidden;background:rgba(0,0,0,.55);
            -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
  .map-zoom button{width:40px;height:40px;background:transparent;border:none;color:var(--txt);font-size:20px;cursor:pointer;
            transition:background var(--fast)}
  .map-zoom button:first-child{border-bottom:1px solid var(--line)}
  .map-zoom button:hover{background:var(--chip)}
  .map-zoom button:active{background:var(--line-strong)}

  /* live A→B navigation */
  .nav-controls{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;animation:slideIn .4s var(--ease)}
  .nc-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .nav-controls input,.nav-controls select{background:var(--panel);border:1px solid var(--line);color:var(--txt);
     border-radius:12px;padding:9px 12px;font-size:13px;outline:none}
  .nav-controls input{min-width:170px}
  .nav-controls input:focus{border-color:var(--accent)}
  .nc-btn{background:var(--panel);border:1px solid var(--line);color:var(--txt);border-radius:12px;
     padding:9px 14px;font-size:13px;font-weight:500;cursor:pointer;
     transition:background var(--fast),border-color var(--fast),transform var(--fast)}
  .nc-btn:hover{background:#242426;border-color:var(--line-strong)}
  .nc-btn:active{transform:scale(.96)}
  .nc-btn.on{background:var(--accent);border-color:transparent;color:#fff}
  .nc-btn.start{background:rgba(48,209,88,.16);border-color:rgba(48,209,88,.3);color:var(--good)}
  .nc-btn.stop{background:rgba(255,69,58,.14);border-color:rgba(255,69,58,.3);color:var(--bad)}
  .nc-btn:disabled{opacity:.4;cursor:not-allowed}
  .nc-status{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .leaflet-container{background:#0a0a0c!important;font-family:inherit}
  .leaflet-attribution-flag{display:none!important}
  .leaflet-control-attribution{background:rgba(10,10,12,.7)!important;color:var(--muted)!important}
  .leaflet-control-attribution a{color:var(--accent)!important}
  .leaflet-control-zoom a{background:rgba(28,28,30,.9)!important;color:var(--txt)!important;border-color:var(--line)!important}
  .veh{width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;
       border-bottom:22px solid var(--accent);filter:drop-shadow(0 0 7px rgba(74,140,255,.95));transform-origin:50% 65%;transition:transform .18s linear}
  .route-glow{filter:drop-shadow(0 0 5px rgba(58,160,255,.85))}
  .travel-glow{filter:drop-shadow(0 0 7px rgba(110,200,255,.95))}
  .ab-pin{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50% 50% 50% 0;
     transform:rotate(-45deg);font-size:12px;font-weight:700;color:#fff;box-shadow:0 3px 9px rgba(0,0,0,.6)}
  .ab-pin span{transform:rotate(45deg)}
  .ab-a{background:var(--good)} .ab-b{background:var(--red)}
  .nav-banner{position:absolute;left:16px;top:16px;z-index:500;display:flex;align-items:center;gap:14px;
     background:rgba(10,10,12,.82);border:1px solid var(--line);border-radius:16px;padding:12px 18px;max-width:62%;
     -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);box-shadow:var(--shadow)}
  .nb-arrow{font-size:30px;line-height:1;color:var(--accent);min-width:30px;text-align:center}
  .nb-inst{font-size:17px;font-weight:600;letter-spacing:-.2px}
  .nb-sub{font-size:12px;color:var(--muted);margin-top:2px}
  /* turn-signal indicators */
  .nb-blink{font-size:26px;line-height:1;color:#ffb020;opacity:.12;min-width:24px;text-align:center}
  .nb-blink.on{animation:blink .55s steps(1,end) infinite}
  @keyframes blink{0%,49.9%{opacity:1;filter:drop-shadow(0 0 8px rgba(255,176,32,.95))}50%,100%{opacity:.12;filter:none}}
  /* live weather widget */
  .wx-widget{position:absolute;right:16px;top:16px;z-index:500;display:flex;align-items:center;gap:11px;
     background:rgba(10,10,12,.82);border:1px solid var(--line);border-radius:14px;padding:9px 15px;
     -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);box-shadow:var(--shadow)}
  .wx-ico{font-size:26px;line-height:1}
  .wx-temp{font-size:18px;font-weight:600;letter-spacing:-.3px}
  .wx-meta{font-size:11px;color:var(--muted);margin-top:1px}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
           display:none;align-items:center;justify-content:center;z-index:50;padding:24px;opacity:0;transition:opacity var(--med)}
  .overlay.open{display:flex;opacity:1}
  .modal{background:#1c1c1e;border:1px solid var(--line-strong);border-radius:26px;
         width:min(580px,100%);max-height:86vh;overflow:auto;box-shadow:var(--shadow);
         transform:translateY(24px) scale(.96);opacity:0;transition:transform var(--med) var(--ease),opacity var(--med)}
  .overlay.open .modal{transform:none;opacity:1}
  .modal::-webkit-scrollbar{width:8px}
  .modal::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:8px}
  .modal .m-head{display:flex;align-items:flex-start;gap:14px;padding:24px 26px;border-bottom:1px solid var(--line);position:sticky;top:0;
         background:rgba(28,28,30,.92);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
  .modal .m-head .mt{flex:1}
  .modal .m-head h3{margin:0 0 5px;font-size:20px;font-weight:600;letter-spacing:-.3px}
  .modal .m-head .path{font-size:12px;color:var(--muted);font-family:ui-monospace,Menlo,monospace}
  .close{background:var(--chip);border:1px solid var(--line);color:var(--txt);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:15px;
         transition:transform var(--fast) var(--ease),background var(--fast);flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .close:hover{background:var(--red);color:#fff;border-color:transparent}
  .close:active{transform:scale(.9)}
  .m-body{padding:24px 26px;display:flex;flex-direction:column;gap:20px}
  .bigval{font-size:52px;font-weight:200;display:flex;align-items:baseline;gap:10px;letter-spacing:-2px;font-variant-numeric:tabular-nums;color:var(--txt)}
  .bigval .unit{font-size:20px;color:var(--muted);font-weight:400}
  .kv{display:grid;grid-template-columns:140px 1fr;gap:10px 14px;font-size:13px}
  .kv .k{color:var(--muted)}
  .kv .v{font-family:ui-monospace,Menlo,monospace}
  .subtable{border:1px solid var(--line);border-radius:15px;overflow:hidden}
  .subtable .row{display:flex;justify-content:space-between;padding:11px 15px;font-size:13px;border-bottom:1px solid var(--line);transition:background var(--fast)}
  .subtable .row:last-child{border-bottom:none}
  .subtable .row:nth-child(odd){background:rgba(255,255,255,.02)}
  .subtable .row:hover{background:rgba(74,140,255,.1)}
  .subtable .row b{color:var(--accent);font-family:ui-monospace,Menlo,monospace;font-variant-numeric:tabular-nums}
  .bar{height:10px;border-radius:8px;background:var(--chip);overflow:hidden;margin-top:8px;border:1px solid var(--line)}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-2));border-radius:8px;animation:fill .6s var(--ease) both}
  @keyframes fill{from{width:0!important}}
  .note{font-size:12px;color:var(--muted);line-height:1.6}
  footer{padding:20px 24px 30px;color:var(--muted);font-size:12px;text-align:center;font-variant-numeric:tabular-nums}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"

</head>
<body>
<header>
  <div class="brand">
    <div style="display:flex;flex-direction:column;gap:2px">
      <h1>Vehicle Telemetry</h1>
      <div class="sub" id="subtitle">—</div>
    </div>
  </div>
  <div class="ident" id="ident"></div>
  <div class="live"><span class="dot"></span> LIVE</div>
</header>
<nav id="tabs"></nav>
<main id="main"></main>
<footer id="footer"></footer>

<div class="overlay" id="overlay">
  <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
</div>

const D2R=Math.PI/180, R2D=180/Math.PI;

/* ---- geocode + route ---- */
async function navGoCity(){
  const name=(document.getElementById("cityInput").value||"").trim();if(!name)return;
  setStatus("Looking up "+name+"…");
  try{
    let r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&city=${encodeURIComponent(name)}`);
    let j=await r.json();
    if(!j.length){r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(name)}`);j=await r.json();}
    if(!j.length){setStatus("City not found: "+name);return;}
    NAV.city={name,lat:+j[0].lat,lon:+j[0].lon};DATA.navigation.city=name;
    NAV.A=NAV.B=NAV.timeline=null;
    ["aMarker","bMarker","routeLayer","travelLayer"].forEach(k=>{if(NAV[k]){NAV.map.removeLayer(NAV[k]);NAV[k]=null;}});
    NAV.map.setView([NAV.city.lat,NAV.city.lon],13);
    const sb=document.getElementById("btnStart");if(sb)sb.disabled=true;
    navRandom();
  }catch(e){setStatus("Lookup failed — check the connection.");}
}
/* snap any coordinate to the nearest public road (OSRM driving network => on land, on a road) */
async function snapToRoad(pt){
  try{
    const u=`https://router.project-osrm.org/nearest/v1/driving/${pt.lon},${pt.lat}?number=1`;
    const r=await fetch(u);const j=await r.json();
    if(j.code==="Ok"&&j.waypoints&&j.waypoints.length){
      const w=j.waypoints[0];
      return {lat:w.location[1],lon:w.location[0],snap:w.distance};
    }
  }catch(e){}
  return null;
}
async function pickRoadPoint(){
  let last=null;
  for(let i=0;i<6;i++){
    const s=await snapToRoad(randNear(NAV.city.lat,NAV.city.lon,3500));
    if(s){last={lat:s.lat,lon:s.lon};if(s.snap<=600)return last;} // close to a road => genuinely on land
  }
  if(last)return last;
  const c=await snapToRoad({lat:NAV.city.lat,lon:NAV.city.lon});
  return c?{lat:c.lat,lon:c.lon}:{lat:NAV.city.lat,lon:NAV.city.lon};
}
async function navRandom(){
  if(!NAV.map)return;
  setStatus("Finding road points…");
  NAV.A=await pickRoadPoint();
  let B=await pickRoadPoint(),tries=0;
  while(tries++<8 && haversine([NAV.A.lat,NAV.A.lon],[B.lat,B.lon])<800) B=await pickRoadPoint();
  NAV.B=B;
  placePin("A",NAV.A);placePin("B",NAV.B);
  await navRoute();
}
async function navRoute(){
  if(!(NAV.A&&NAV.B))return;

  try{
    const r=await fetch(url);const j=await r.json();
    if(j.code!=="Ok"||!j.routes||!j.routes.length){setStatus("No route found — try Random A→B again.");return;}
    buildTimeline(j.routes[0]);drawRoute();

function drawRoute(){
  if(NAV.routeLayer)NAV.map.removeLayer(NAV.routeLayer);
  if(NAV.travelLayer){NAV.map.removeLayer(NAV.travelLayer);NAV.travelLayer=null;}
  const coords=NAV.timeline.coords;

/* ---- trip timeline (time → distance → lat/lon) ---- */
function buildTimeline(route){
  const coords=route.geometry.coordinates.map(c=>[c[1],c[0]]);
  const cum=[0];for(let i=1;i<coords.length;i++)cum[i]=cum[i-1]+haversine(coords[i-1],coords[i]);
  const geoTotal=cum[cum.length-1];
  const steps=(route.legs[0]&&route.legs[0].steps)||[];
  let td=0,dd=0;
  const segs=steps.map(s=>{const dur=s.duration||0.001;const seg={t0:td,t1:td+dur,d0:dd,d1:dd+(s.distance||0),
    spd:(s.distance&&dur)?(s.distance/dur)*3.6:0,man:s.maneuver||{},name:s.name||""};td=seg.t1;dd=seg.d1;return seg;});
  const k=dd?geoTotal/dd:1;segs.forEach(s=>{s.d0*=k;s.d1*=k;});
  NAV.timeline={coords,cum,segs,totalDist:geoTotal,totalDur:td||Math.max(1,geoTotal/13.8)};
}
function distToLatLon(d){
  const {coords,cum}=NAV.timeline,total=cum[cum.length-1];
  if(d<=0)return {lat:coords[0][0],lon:coords[0][1],head:bearing(coords[0],coords[1]||coords[0])};
  if(d>=total){const n=coords.length-1;return {lat:coords[n][0],lon:coords[n][1],head:bearing(coords[n-1]||coords[n],coords[n])};}
  let i=1;while(i<cum.length&&cum[i]<d)i++;
  const f=(d-cum[i-1])/((cum[i]-cum[i-1])||1),a=coords[i-1],b=coords[i];
  return {lat:a[0]+(b[0]-a[0])*f,lon:a[1]+(b[1]-a[1])*f,head:bearing(a,b)};
}
function stateAtTime(t){
  const tl=NAV.timeline;t=Math.max(0,Math.min(t,tl.totalDur));
  let i=tl.segs.findIndex(s=>t<s.t1);if(i<0)i=tl.segs.length-1;
  const s=tl.segs[i],f=s.t1>s.t0?(t-s.t0)/(s.t1-s.t0):1,dist=s.d0+f*(s.d1-s.d0),p=distToLatLon(dist);
  const next=tl.segs[i+1];
  const distToTurn=next?Math.max(0,next.d0-dist):Math.max(0,s.d1-dist);
  const man=next?next.man:{type:"arrive"},name=next?next.name:"";
  return {lat:p.lat,lon:p.lon,head:p.head,dist,spd:s.spd,stepIndex:i,totalSteps:tl.segs.length,distToTurn,man,name,t};
}
function traveledCoords(d){
  const {coords,cum}=NAV.timeline,out=[coords[0]];
  for(let i=1;i<coords.length;i++){
    if(cum[i]<=d)out.push(coords[i]);
    else{const f=(d-cum[i-1])/((cum[i]-cum[i-1])||1);
      out.push([coords[i-1][0]+(coords[i][0]-coords[i-1][0])*f,coords[i-1][1]+(coords[i][1]-coords[i-1][1])*f]);break;}
  }return out;
}
function maneuverText(man,name){
  const m=man||{},ty=m.type||"",mod=m.modifier||"",onN=name?` onto ${name}`:"",onR=name?` on ${name}`:"";
  switch(ty){
    case "depart":return `Head ${mod||"out"}${onR}`;
    case "turn":return `Turn ${mod}${onN}`;
    case "new name":return `Continue${onR}`;
    case "continue":return (`Continue ${mod}`).trim()+onR;
    case "merge":return `Merge ${mod}${onN}`;
    case "on ramp":return `Take the ramp${onN}`;
    case "off ramp":return `Take the exit${onN}`;
    case "fork":return `Keep ${mod}${onN}`;
    case "end of road":return `Turn ${mod}${onN}`;
    case "roundabout":case "rotary":return `Take the roundabout${onN}`;
    case "arrive":return "Arrive at destination";
    default:return name?`Continue${onR}`:(mod?`Continue ${mod}`:"Continue");

function arrowFor(m){const md=(m&&m.modifier)||"",ty=(m&&m.type)||"";
  if(ty==="arrive")return "◉";
  if(ty==="roundabout"||ty==="rotary")return "↻";
  if(md.indexOf("uturn")>=0)return "↩";
  if(md==="slight left")return "↖";if(md==="slight right")return "↗";
  if(md.indexOf("left")>=0)return "⬅";if(md.indexOf("right")>=0)return "➡";
  return "↑";}

function turnSignal(st){
  const m=st.man||{},ty=m.type||"",mod=m.modifier||"";
  if(ty==="arrive"||ty==="depart")return "off";
  const lead=Math.max(40,Math.min(180,(st.spd||30)*4)); // start blinking a few seconds before the turn
  if(st.distToTurn>lead)return "off";
  if(mod.indexOf("uturn")>=0)return "left";
  if(mod.indexOf("left")>=0)return "left";
  if(mod.indexOf("right")>=0)return "right";
  return "off";
}
/* ---- live weather (Open-Meteo, no API key, CORS-friendly) ---- */
function weatherInfo(c){
  const m={0:["Clear","☀️"],1:["Mainly clear","🌤️"],2:["Partly cloudy","⛅"],3:["Overcast","☁️"],
    45:["Fog","🌫️"],48:["Rime fog","🌫️"],51:["Light drizzle","🌦️"],53:["Drizzle","🌦️"],55:["Dense drizzle","🌧️"],
    56:["Freezing drizzle","🌧️"],57:["Freezing drizzle","🌧️"],61:["Light rain","🌦️"],63:["Rain","🌧️"],65:["Heavy rain","🌧️"],
    66:["Freezing rain","🌧️"],67:["Freezing rain","🌧️"],71:["Light snow","🌨️"],73:["Snow","🌨️"],75:["Heavy snow","❄️"],
    77:["Snow grains","🌨️"],80:["Rain showers","🌦️"],81:["Rain showers","🌧️"],82:["Violent showers","⛈️"],
    85:["Snow showers","🌨️"],86:["Snow showers","❄️"],95:["Thunderstorm","⛈️"],96:["Thunderstorm","⛈️"],99:["Thunderstorm","⛈️"]};
  return m[c]||["—","🌡️"];
}
async function fetchWeather(lat,lon){
  try{
    const u=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m&wind_speed_unit=kmh&timezone=auto`;
    const r=await fetch(u);const j=await r.json();
    if(!j||!j.current)return;
    const cur=j.current,wi=weatherInfo(cur.weather_code);
    NAV.wx={temp_c:cur.temperature_2m,feels_c:cur.apparent_temperature,humidity_pct:cur.relative_humidity_2m,
      precip_mm:cur.precipitation,wind_kmh:cur.wind_speed_10m,code:cur.weather_code,condition:wi[0],icon:wi[1],
      lat:+(+lat).toFixed(4),lon:+(+lon).toFixed(4),updated:new Date().toISOString()};
    DATA.weather=NAV.wx;
    renderWeather();
  }catch(e){}
}
function renderWeather(){
  const el=document.getElementById("wxWidget");if(!el)return;
  const w=NAV.wx;
  if(!w){el.style.display="none";return;}
  el.style.display="flex";
  document.getElementById("wxIco").textContent=w.icon;
  document.getElementById("wxTemp").textContent=`${Math.round(w.temp_c)}°C`;
  document.getElementById("wxMeta").textContent=`${w.condition} • 💧${Math.round(w.humidity_pct)}% • 💨${Math.round(w.wind_kmh)} km/h`;
}
function weatherForCurrent(){
  let lat=NAV.city.lat,lon=NAV.city.lon;
  if(DATA.location&&DATA.location.gps_latitude){lat=DATA.location.gps_latitude;lon=DATA.location.gps_longitude;}
  fetchWeather(lat,lon);
}

/* ---- simulation: smooth ~60fps visual loop + datapoint emit every 5s ---- */
function navTripT(){
  if(!NAV.timeline)return 0;
  return Math.min(NAV.timeline.totalDur,((performance.now()-NAV.startWall)/1000)*NAV.simSpeed);
}
function navStart(){
  if(NAV.running||!hasLeaflet())return;
  if(!NAV.timeline){setStatus("Set a route first (Random A→B).");return;}
  const slug=NAV.city.name.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"")||"trip";
  const ts=new Date().toISOString().replace(/[-:T]/g,"").slice(0,14);
  NAV.session=`${slug}-${ts}`;DATA.navigation.session_id=NAV.session;
  NAV.tripT=0;NAV.seq=0;NAV.posts=0;NAV.running=true;NAV.ingestOK=true;
  NAV.startWall=performance.now();
  const sb=document.getElementById("btnStart"),tb=document.getElementById("btnStop");
  if(sb)sb.disabled=true;if(tb)tb.disabled=false;
  const live=document.querySelector(".live");if(live)live.innerHTML='<span class="dot"></span> DRIVING';
  emitDatapoint();                                  // first datapoint right away
  NAV.timer=setInterval(emitDatapoint,NAV.emitMs);  // persist a datapoint every 5s
  weatherForCurrent();                              // refresh weather at trip start
  NAV.wxTimer=setInterval(weatherForCurrent,600000); // and every 10 min along the way
  NAV.raf=requestAnimationFrame(navFrame);          // smooth visual updates
}
function navFrame(){
  if(!NAV.running)return;
  NAV.tripT=navTripT();
  applyState(stateAtTime(NAV.tripT));
  if(activeTab==="location")liveCards();
  if(NAV.tripT>=NAV.timeline.totalDur){navStop(true);return;}
  NAV.raf=requestAnimationFrame(navFrame);
}
function emitDatapoint(){
  if(!NAV.timeline)return;
  NAV.tripT=navTripT();
  applyState(stateAtTime(NAV.tripT));               // keep datapoints correct even if frames throttle
  postDatapoint();
  if(activeTab==="navigation"||activeTab==="overview")selectTab(activeTab);
  if(NAV.tripT>=NAV.timeline.totalDur)navStop(true);
}
function navStop(arrived){
  NAV.running=false;
  if(NAV.timer){clearInterval(NAV.timer);NAV.timer=null;}
  if(NAV.wxTimer){clearInterval(NAV.wxTimer);NAV.wxTimer=null;}
  if(NAV.raf){cancelAnimationFrame(NAV.raf);NAV.raf=null;}
  const sb=document.getElementById("btnStart"),tb=document.getElementById("btnStop");
  if(sb)sb.disabled=false;if(tb)tb.disabled=true;
  const live=document.querySelector(".live");if(live)live.innerHTML='<span class="dot"></span> '+(arrived===true?"ARRIVED":"LIVE");
  setStatus((arrived===true?"Arrived • ":"Stopped • ")+`${NAV.posts} datapoints saved${NAV.session?` → telemetry/${NAV.session}.ndjson`:""}`);
}
function applyState(st){
  const now=new Date();
  DATA.event_timestamp=now.toISOString();DATA.ingest_timestamp=now.toISOString();
  DATA.message_seq=BASE.seq+(++NAV.seq);
  const spd=Math.max(0,+st.spd.toFixed(1));
  DATA.location.gps_latitude=+st.lat.toFixed(6);
  DATA.location.gps_longitude=+st.lon.toFixed(6);
  DATA.location.gps_heading_deg=Math.round(st.head);
  DATA.location.gps_speed_kmh=spd;
  DATA.location.trip_distance_km=+(st.dist/1000).toFixed(2);
  DATA.drivetrain.vehicle_speed_kmh=spd;
  DATA.dynamics.odometer_km=+(BASE.odo+st.dist/1000).toFixed(1);
  DATA.battery.pack_soc_pct=Math.max(1,+(BASE.soc-(st.dist/1000)*0.18).toFixed(1));
  const inst=maneuverText(st.man,st.name);
  const sig=turnSignal(st);
  DATA.navigation={session_id:NAV.session,city:NAV.city.name,
    origin:NAV.A?{lat:+NAV.A.lat.toFixed(6),lon:+NAV.A.lon.toFixed(6)}:null,
    destination:NAV.B?{lat:+NAV.B.lat.toFixed(6),lon:+NAV.B.lon.toFixed(6)}:null,
    instruction:inst,maneuver_type:st.man.type||"",maneuver_modifier:st.man.modifier||"",road_name:st.name||"",
    distance_to_turn_m:Math.round(st.distToTurn),distance_remaining_m:Math.round(NAV.timeline.totalDist-st.dist),
    distance_travelled_m:Math.round(st.dist),route_distance_m:Math.round(NAV.timeline.totalDist),
    route_duration_s:Math.round(NAV.timeline.totalDur),eta_s:Math.max(0,Math.round(NAV.timeline.totalDur-st.t)),
    progress_pct:+(100*st.dist/NAV.timeline.totalDist).toFixed(1),
    step_index:st.stepIndex,total_steps:st.totalSteps,sim_speed_x:NAV.simSpeed,turn_signal:sig};
  if(NAV.map){
    if(!NAV.marker)NAV.marker=L.marker([st.lat,st.lon],{icon:vehIcon(st.head),zIndexOffset:1000}).addTo(NAV.map);
    else NAV.marker.setLatLng([st.lat,st.lon]);
    const mel=NAV.marker.getElement&&NAV.marker.getElement(),veh=mel&&mel.querySelector(".veh");
    if(veh)veh.style.transform=`rotate(${st.head||0}deg)`;
    if(NAV.running)NAV.map.setView([st.lat,st.lon],NAV.map.getZoom(),{animate:false});
    const trav=traveledCoords(st.dist);
    if(NAV.travelLayer)NAV.travelLayer.setLatLngs(trav);
    else NAV.travelLayer=L.polyline(trav,{color:"#6ec8ff",weight:7,opacity:1,lineJoin:"round",lineCap:"round",className:"travel-glow"}).addTo(NAV.map);
  }
  updateNavOverlay(st,inst,sig);
}
function updateNavOverlay(st,inst,sig){
  const b=document.getElementById("navBanner");
  if(b){b.style.display="flex";
    document.getElementById("nbArrow").textContent=arrowFor(st.man);
    document.getElementById("nbInst").textContent=inst;
    document.getElementById("nbSub").textContent=`${fmtKm(st.distToTurn)} • then ${fmtKm(NAV.timeline.totalDist-st.dist)} to arrival`;
    const lb=document.getElementById("nbLeft"),rb=document.getElementById("nbRight");
    if(lb)lb.classList.toggle("on",sig==="left");
    if(rb)rb.classList.toggle("on",sig==="right");}
  const c=document.getElementById("navChips");
  if(c)c.innerHTML=`
    <div class="map-chip"><span class="k">Speed</span><span class="v">${Math.round(st.spd)} km/h</span></div>
    <div class="map-chip"><span class="k">ETA</span><span class="v">${fmtDur(Math.max(0,NAV.timeline.totalDur-st.t))}</span></div>
    <div class="map-chip"><span class="k">Remaining</span><span class="v">${fmtKm(NAV.timeline.totalDist-st.dist)}</span></div>
    <div class="map-chip"><span class="k">Progress</span><span class="v">${(100*st.dist/NAV.timeline.totalDist).toFixed(0)}%</span></div>`;
}
function liveCards(){
  document.querySelectorAll('#main .card[data-path^="location."]').forEach(c=>{
    const k=c.dataset.path.split(".")[1],v=DATA.location[k],val=c.querySelector(".val");
    if(val&&typeof v==="number"){const u=unitFor(k);val.innerHTML=`${v}${u?`<span class="unit">${u}</span>`:""}`;}
  });
}
function postDatapoint(){
  const dp=JSON.parse(JSON.stringify(DATA));
  fetch("/ingest",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(dp)})
    .then(r=>r.json()).then(j=>{if(j&&j.ok){NAV.posts=j.count;
      if(NAV.running)setStatus(`Driving • ${NAV.posts} datapoints → telemetry/${j.file} • ETA ${fmtDur(DATA.navigation.eta_s)}`);}})
    .catch(()=>{if(NAV.ingestOK){NAV.ingestOK=false;
      setStatus("⚠ Datapoints can't be saved — open via the server (docker compose up → http://localhost:8080).");}});
}

/* ---- tabs ---- */
function domains(){return Object.keys(DATA).filter(k=>!ENVELOPE.includes(k));}
function countLeaves(v){
  if(isLeaf(v)) return 1;

  return Object.values(v).reduce((a,x)=>a+countLeaves(x),0);
}

/* ---- cards ---- */
function cardHTML(domain,key,value){
  const path=`${domain}.${key}`;
  const magnify=`<span class="magnify">⤢</span>`;
  // nested object (wheels/corners) -> mini grid
  if(value && typeof value==="object" && !Array.isArray(value)){
    const entries=Object.entries(value);
    const numeric=entries.every(([,x])=>typeof x==="number");
    const inner = entries.slice(0,4).map(([k,x])=>`<div class="w"><span>${k.toUpperCase()}</span><b>${x}</b></div>`).join("");
    return `<div class="card" data-path="${path}">${magnify}
      <div class="label">${labelNoUnit(key)} ${unitFor(key)?`(${unitFor(key)})`:""}</div>
      <div class="wheels">${inner}</div>
      <div class="meta">${entries.length} channels${numeric?" • click for stats":""}</div></div>`;
  }
  // array (module temps) -> sparkline
  if(Array.isArray(value)){
    if(!value.length) return `<div class="card" data-path="${path}">${magnify}
      <div class="label">${labelNoUnit(key)}</div><div class="val"><span class="badge b-good">NONE</span></div>
      <div class="meta">empty array</div></div>`;
    const max=Math.max(...value),min=Math.min(...value);
    const bars=value.map(x=>`<span style="height:${6+((x-min)/((max-min)||1))*28}px"></span>`).join("");
    return `<div class="card" data-path="${path}">${magnify}
      <div class="label">${labelNoUnit(key)} ${unitFor(key)?`(${unitFor(key)})`:""}</div>
      <div class="spark">${bars}</div>
      <div class="meta">${value.length} values • ${min}–${max}</div></div>`;
  }
  // boolean
  if(isBool(value)){
    return `<div class="card" data-path="${path}">${magnify}
      <div class="label">${labelNoUnit(key)}</div>
      <div class="val"><span class="badge ${boolBadge(key,value)}">${value?"YES":"NO"}</span></div></div>`;
  }
  // null
  if(value===null){
    return `<div class="card" data-path="${path}">${magnify}
      <div class="label">${labelNoUnit(key)}</div>
      <div class="val"><span class="badge b-neutral">NONE</span></div></div>`;
  }
  // string enum
  if(typeof value==="string"){
    return `<div class="card" data-path="${path}">${magnify}
      <div class="label">${labelNoUnit(key)}</div>
      <div class="val"><span class="badge b-neutral">${value}</span></div></div>`;
  }
  // number
  const u=unitFor(key);
  return `<div class="card" data-path="${path}">${magnify}
    <div class="label">${labelNoUnit(key)}</div>
    <div class="val">${value}${u?`<span class="unit">${u}</span>`:""}</div></div>`;
}

function renderDomain(domain){
  const obj=DATA[domain];

  main.innerHTML=`<div class="panel-title"><h2>${pretty(domain)}</h2>

        <span class="k">Max</span><span class="v">${mx} ${u}</span>

        <div class="subtable">${rows}</div>`;
    } else body=`<div class="note">Empty array — no active entries (e.g. no fault/diagnostic codes set).</div>`;
  } else if(isBool(value)){

      <div class="note">Binary status flag.</div>`;
  } else if(value===null){
    body=`<div class="bigval"><span class="badge b-neutral" style="font-size:22px;padding:8px 16px">NULL</span></div>
      <div class="note">No value reported for this signal at this sample.</div>`;
  } else if(typeof value==="string"){
    body=`<div class="bigval"><span class="badge b-neutral" style="font-size:26px;padding:8px 16px">${value}</span></div>`;
  } else {
    let bar="";
    if(key.endsWith("_pct")) bar=`<div class="bar"><i style="width:${Math.max(0,Math.min(100,value))}%"></i></div>`;

  const meta=`<div class="kv">
      <span class="k">Full path</span><span class="v">${path}</span>
      <span class="k">Type</span><span class="v">${kind}</span>
      <span class="k">Unit</span><span class="v">${u||"—"}</span>
      <span class="k">Domain</span><span class="v">${domain}</span>
      <span class="k">Sampled at</span><span class="v">${new Date(DATA.event_timestamp).toLocaleString()}</span>
    </div>`;
  document.getElementById("modal").innerHTML=`
    <div class="m-head">
      <div class="mt"><h3>${labelNoUnit(key)}</h3><div class="path">${pretty(domain)} › ${key}</div></div>
      <button class="close" onclick="closeModal()">✕</button>
    </div>
    <div class="m-body">${body}${meta}</div>`;
  document.getElementById("overlay").classList.add("open");
}
function closeModal(){document.getElementById("overlay").classList.remove("open");}
document.getElementById("overlay").onclick=e=>{if(e.target.id==="overlay")closeModal();};
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});

function bindCards(){
  document.querySelectorAll(".card").forEach((c,i)=>{
    c.style.animationDelay=(Math.min(i,24)*20)+"ms";
  });
  document.querySelectorAll(".card[data-path]").forEach(c=>c.onclick=()=>openModal(c.dataset.path));
}

/* ---- footer ---- */
function renderFooter(){
  const total=domains().reduce((a,k)=>a+countLeaves(DATA[k]),0);
  document.getElementById("footer").textContent=
    `${total} datapoints across ${domains().length} domains • ingested ${new Date(DATA.ingest_timestamp).toLocaleString()} • synthetic sample data`;
}

/* ---- boot ---- */
renderHeader();renderTabs();renderFooter();selectTab("overview");
</script>
</body>
</html>
